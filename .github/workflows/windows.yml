name: windows
on:
  push:
    branches:
      - '*'
    tags-ignore:
      - '*'
  pull_request:
jobs:
  perl:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v2
      - name: Set up Perl
        uses: shogo82148/actions-setup-perl@v1
        with:
          distribution: strawberry
          perl-version: '5.40'
      - name: perl -V
        run: perl -V
      - name: Install dependencies
        shell: bash
        # Net::IDN::Encode has an XS build failure on Strawberry Perl, so install
        # JSON::Validator without it; its IDN formats are not used by MCP
        run: |
          cpanm -n --force JSON::Validator || true
          cpanm -n --installdeps .
      - name: Run tests
        run: prove -l t
        env:
          TEST_STDIO: 1
