name: windows
on:
  push:
    branches:
      - '*'
    tags-ignore:
      - '*'
  pull_request:
jobs:
  perl:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v2
      - name: Set up Perl
        uses: shogo82148/actions-setup-perl@v1
        with:
          distribution: strawberry
          perl-version: '5.40'
      - name: perl -V
        run: perl -V
      - name: Install dependencies
        run: cpanm -n --verbose --installdeps .
      - name: Run tests
        run: prove -l t
        env:
          TEST_STDIO: 1
